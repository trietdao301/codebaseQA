version: "3.8"

services:
  nextjs:
    build:
      context: .
      args:
        NEXT_PUBLIC_LANGGRAPH_API_URL: /langgraph
        NEXT_PUBLIC_LANGGRAPH_ASSISTANT_ID: agent
    container_name: nextjs
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - INNGEST_DEV=1
      - INNGEST_BASE_URL=http://inngest:8288
      - INNGEST_BROWSER_BASE_URL=http://129.153.209.56:8080/inngest
      - NEXT_PUBLIC_LANGGRAPH_API_URL=/langgraph
      - LANGGRAPH_API_URL=http://langgraph:2024
    depends_on:
      - inngest
      - langgraph
    networks:
      - app-network

  inngest:
    image: inngest/inngest:latest
    container_name: inngest
    restart: always
    expose:
      - "8288"
    command: "inngest dev -u http://nextjs:3000/api/inngest"
    networks:
      - app-network

  langgraph:
    build:
      context: .
      dockerfile: DockerLanggraph.dockerfile
    container_name: langgraph
    restart: always
    expose:
      - "2024"
    env_file:
      - .env
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "8080:80" # access via http://localhost:8080
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nextjs
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
